name: Red Legion Sentinel
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-anthropic:
    runs-on: ubuntu-latest
    steps:
      - name: Scan Anthropic Issues
        env:
          # AHORA USAMOS SECRETS, NO TEXTO PLANO
          GH_SECRET: ${{ secrets.GH_SECRET }}
          TARGET_URL: ${{ secrets.CLOUD_RUN_URL }}
        run: |
          # 1. Captura de datos (Sigilo total)
          curl -s "https://api.github.com/repos/anthropics/claude-code/issues?state=all&per_page=10" -o data.json
          
          if [ ! -s data.json ]; then
            echo "❌ Error: No se recibieron datos de GitHub"
            exit 1
          fi

          # 2. Calcular la firma HMAC-SHA256
          SIGNATURE=$(openssl dgst -sha256 -hmac "$GH_SECRET" data.json | sed 's/^.* //')
          
          # 3. Camuflaje: Nos hacemos pasar por el bot de Google
          UA="Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)"

          # 4. Enviar al sensor con máscara de identidad
          echo "🛰️ Transmisión cifrada en curso..."
          curl -X POST "$TARGET_URL" \
            -A "$UA" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: issues" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            --data-binary @data.json
